server:
  port: 8080

spring:
  application:
    name: maint
  profiles:
    active: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 25
  flyway:
    enabled: true
    locations: classpath:db/migration

  cache:
    type: redis
    redis:
      time-to-live: 600000

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: maint
    password: maint_dev

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

maint:
  jwt:
    secret: ${JWT_SECRET:YzY2YzhmNTYzM2I3NGQxMzhhYmM2YjA3ZjQ1Mjg5MDE2YzY2YzhmNTYzM2I3NGQxMzhhYmM2YjA3ZjQ1Mjg5MDE=}
    access-token-ttl: 900000
    refresh-token-ttl: 604800000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
