spring:
  datasource:
    url: jdbc:h2:mem:maint;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  cache:
    type: none
  rabbitmq:
    enabled: false

maint:
  jwt:
    secret: YzY2YzhmNTYzM2I3NGQxMzhhYmM2YjA3ZjQ1Mjg5MDE2YzY2YzhmNTYzM2I3NGQxMzhhYmM2YjA3ZjQ1Mjg5MDE=

logging:
  level:
    com.maint: DEBUG
    org.springframework.security: DEBUG
