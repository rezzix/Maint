spring:
  datasource:
    url: jdbc:h2:file:./data/maint;MODE=PostgreSQL;AUTO_RECONNECT=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  flyway:
    enabled: false
  cache:
    type: none
  rabbitmq:
    enabled: false

maint:
  jwt:
    secret: YzY2YzhmNTYzM2I3NGQxMzhhYmM2YjA3ZjQ1Mjg5MDE2YzY2YzhmNTYzM2I3NGQxMzhhYmM2YjA3ZjQ1Mjg5MDE=

logging:
  level:
    com.maint: DEBUG
    org.springframework.security: DEBUG
