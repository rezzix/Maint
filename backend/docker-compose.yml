services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: maint
      POSTGRES_USER: maint
      POSTGRES_PASSWORD: maint_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: maint
      MINIO_ROOT_PASSWORD: maint_dev
    ports:
      - "9000:9000"
      - "9001:9001"

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: maint
      RABBITMQ_DEFAULT_PASS: maint_dev
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  pgdata:
